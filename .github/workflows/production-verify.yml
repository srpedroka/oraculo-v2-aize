name: Verify production commit

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit exato publicado em producao
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Confirm checked out commit
        run: test "$(git rev-parse HEAD)" = "${{ inputs.commit_sha }}"
      - name: Verify migrations, functions and frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node --experimental-strip-types scripts/run-ci-command.ts production-verify -- pnpm run verify:deploy
